<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>two8ai | Under Construction</title>
  <meta name="description" content="two8ai is coming soon. This site is under construction." />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e5e7eb;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #020617;
      border-radius: 18px;
      padding: 24px 22px 20px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
      text-align: center;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      background: radial-gradient(circle at 30% 20%, #f9fafb, #38bdf8 40%, #0f172a 100%);
      color: #020617;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tagline {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.6);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #e5e7eb;
      margin-bottom: 14px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #f97316;
      box-shadow: 0 0 10px rgba(248, 167, 45, 0.9);
    }

    .text {
      font-size: 13px;
      color: #d1d5db;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .contact {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    .contact a {
      color: #38bdf8;
      text-decoration: none;
      border-bottom: 1px dotted rgba(56, 189, 248, 0.7);
    }

    .contact a:hover {
      border-bottom-style: solid;
    }

    .footer {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">2</div>

    <h1>two8ai</h1>
    <div class="tagline">New website coming soon</div>

    <div class="badge">
      <span class="dot"></span>
      <span>Under construction</span>
    </div>

    <p class="text">
      Ham filhaal is site ko update kar rahe hain.<br />
      Thodi der baad wapas check karein.
    </p>

    <p class="contact">
      Contact: 
      <a href="mailto:hello@two8ai.com">hello@two8ai.com</a>
    </p>

    <div class="footer">
      © <span id="year"></span> two8ai
    </div>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
